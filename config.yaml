# ============================================================
# Hugo Ladder Theme Config
# 分支: theme-ladder
# ============================================================

baseURL: ''
title: 'prodeer'
theme: hugo-theme-ladder
description: 'prodeer 的技术博客'
homepage: ''
defaultContentLanguage: 'zh'
paginate: 10
enableRobotsTXT: true
hasCJKLanguage: true

# Minify 配置：禁用 JSON minify（Ladder 主题 JSON-LD 模板与 Hugo JSON 压缩器不兼容）
minify:
  disableJSON: true

# 作者信息（供 RSS 等模板使用）
Author:
  name: "prodeer"
  email: ""

# 内容分类法
taxonomies:
  tag: tags
  series: series

params:
  # 站点品牌
  brand: HOME
  avatarURL: /imgs/liulu_avatar.png
  author: prodeer
  authorDescription: 记录技术学习与生活思考
  info: 一个专注于技术与思考的博客
  favicon: /imgs/liulu_avatar.png

  # 主题选项
  options:
    showDarkMode: true
    enableImgZooming: true
    enableMultiLang: false
    showMetaTags: true
  darkModeTheme: data-dark-mode

  # 评论（按需启用）
  comments:
    giscus:
      enable: false
    utteranc:
      enable: false

  # 分析（按需启用）
  analytics:
    google:
      SiteVerificationTag: ''
    umami:
      enable: false
      website_id: ''
      url: ''

  # 社交链接（按需填写）
  social: []

# 多语言（当前仅中文）
languages:
  zh:
    label: 中文
    author: prodeer
    authorDescription: 记录技术学习与生活思考
    info: 一个专注于技术与思考的博客
    menu:
      main:
        - name: 文章
          url: /post
          weight: 1
        - name: 标签
          url: /tags
          weight: 2
        - name: 归档
          url: /archives
          weight: 3
        - name: 关于
          url: /about
          weight: 4
