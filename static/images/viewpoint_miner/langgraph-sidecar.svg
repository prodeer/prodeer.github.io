<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="700" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">Viewpoint Miner LangGraph 旁路架构</title>
  <desc id="desc">观点入库后，原有规则提取链路继续运行，同时可选写入 Agent 事件，由独立 Worker 驱动 LangGraph，生成待人工审批的草案。</desc>
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="5" orient="auto">
      <path d="M0 0L10 5L0 10Z" fill="#64748b"/>
    </marker>
    <style>
      .bg{fill:#f8fafc}.box{fill:#fff;stroke:#cbd5e1;stroke-width:2}.core{fill:#ecfdf5;stroke:#10b981}.agent{fill:#fff7ed;stroke:#f97316}.human{fill:#fef2f2;stroke:#ef4444}.title{font:700 24px system-ui,sans-serif;fill:#172033}.label{font:700 18px system-ui,sans-serif;fill:#172033}.small{font:14px system-ui,sans-serif;fill:#526174}.note{font:600 15px system-ui,sans-serif;fill:#526174}.line{fill:none;stroke:#64748b;stroke-width:2.5;marker-end:url(#arrow)}.dash{stroke-dasharray:8 7}.lane{font:700 16px system-ui,sans-serif}.green{fill:#047857}.orange{fill:#c2410c}
    </style>
  </defs>
  <rect class="bg" width="1200" height="700" rx="8"/>
  <text class="title" x="60" y="52">观点入库后，Agent 走旁路，不接管原同步链路</text>

  <rect class="box" x="60" y="95" width="220" height="92" rx="8"/>
  <text class="label" x="170" y="133" text-anchor="middle">观点同步</text>
  <text class="small" x="170" y="160" text-anchor="middle">HTTP / cron / MCP</text>

  <rect class="box core" x="380" y="95" width="300" height="92" rx="8"/>
  <text class="label" x="530" y="130" text-anchor="middle">SQLite 短事务</text>
  <text class="small" x="530" y="157" text-anchor="middle">viewpoints + 股票关联</text>
  <text class="small" x="530" y="177" text-anchor="middle">agent_events（可选）</text>

  <path class="line" d="M280 141H380"/>
  <path class="line" d="M530 187V250H265V290"/>
  <path class="line dash" d="M530 187V250H925V290"/>

  <text class="lane green" x="265" y="276" text-anchor="middle">原有确定性链路</text>
  <rect class="box core" x="85" y="290" width="360" height="112" rx="8"/>
  <text class="label" x="265" y="330" text-anchor="middle">规则提取 / Embedding / 通知</text>
  <text class="small" x="265" y="360" text-anchor="middle">继续写正式 trade_actions</text>
  <text class="small" x="265" y="383" text-anchor="middle">Agent 关闭或失败都不影响入库</text>

  <text class="lane orange" x="925" y="276" text-anchor="middle">默认关闭的 Agent 旁路</text>
  <rect class="box agent" x="765" y="290" width="320" height="112" rx="8"/>
  <text class="label" x="925" y="330" text-anchor="middle">独立 Agent Worker</text>
  <text class="small" x="925" y="360" text-anchor="middle">领取事件 / 租约恢复 / 最多重试 3 次</text>
  <text class="small" x="925" y="383" text-anchor="middle">固定 shadow_mode = true</text>

  <path class="line" d="M925 402V447"/>
  <rect class="box agent" x="665" y="447" width="520" height="116" rx="8"/>
  <text class="label" x="925" y="480" text-anchor="middle">LangGraph StateGraph</text>
  <text class="small" x="925" y="511" text-anchor="middle">加载上下文 → 分析 → 证据校验 → 变化检测</text>
  <text class="small" x="925" y="536" text-anchor="middle">生成草案 → 等待审批 / 无动作则结束</text>

  <path class="line" d="M925 563V606H700"/>
  <rect class="box human" x="485" y="592" width="430" height="76" rx="8"/>
  <text class="label" x="700" y="625" text-anchor="middle">agent_signal_drafts → 人工审批</text>
  <text class="small" x="700" y="650" text-anchor="middle">批准仍不写正式信号，也不创建交易计划</text>

  <text class="note" x="60" y="650">实线：原业务链路</text>
  <text class="note" x="60" y="674">虚线：仅 AGENT_ENABLED=true 时写入事件</text>
</svg>
