<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 620">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fafbfc"/>
      <stop offset="100%" stop-color="#edf2f7"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/></filter>
    <marker id="arr" markerWidth="8" markerHeight="7" refX="8" refY="3.5" orient="auto">
      <polygon points="0,0 8,3.5 0,7" fill="#5b6f82"/>
