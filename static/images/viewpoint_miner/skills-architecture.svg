  <rect width="920" height="620" rx="10" fill="url(#bg)"/>
  <text x="460" y="34" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#2c3e50">Skills 架构：在用户意图与 MCP 工具之间</text>

