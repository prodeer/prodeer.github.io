  <line x1="200" y1="184" x2="200" y2="208" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="340" y1="184" x2="340" y2="208" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="460" y1="184" x2="460" y2="208" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="580" y1="184" x2="580" y2="208" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arr2)"/>
  <line x1="720" y1="184" x2="720" y2="208" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arr2)"/>

