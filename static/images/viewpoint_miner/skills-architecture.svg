  <line x1="289" y1="362" x2="289" y2="398" stroke="#27ae60" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <line x1="459" y1="362" x2="459" y2="398" stroke="#e67e22" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <line x1="629" y1="362" x2="629" y2="398" stroke="#8e44ad" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr2)"/>
  <line x1="799" y1="362" x2="799" y2="398" stroke="#c0392b" stroke-width="1" stroke-dasharray="4,3" marker-end="url(#arr2)"/>

