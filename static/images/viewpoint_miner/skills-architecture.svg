  <line x1="224" y1="294" x2="354" y2="294" stroke="#ecf0f1" stroke-width="1"/>
  <text x="224" y="307" font-family="system-ui,sans-serif" font-size="9" fill="#2c3e50" font-weight="600">工具链</text>
  <text x="224" y="321" font-family="SF Mono,monospace" font-size="7" fill="#27ae60">list_authors</text>
  <text x="224" y="333" font-family="SF Mono,monospace" font-size="7" fill="#27ae60">→ summarize_style</text>
  <text x="224" y="345" font-family="SF Mono,monospace" font-size="7" fill="#27ae60">→ get_author_...</text>
  <text x="224" y="358" font-family="system-ui,sans-serif" font-size="7" fill="#95a5a6">(详情)</text>

