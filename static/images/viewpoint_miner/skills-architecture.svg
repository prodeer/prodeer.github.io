  <text x="874" y="232" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#e74c3c">❌</text>
  <text x="874" y="248" text-anchor="middle" font-family="system-ui,sans-serif" font-size="7" fill="#e74c3c">无 Skill</text>
  <text x="874" y="265" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#95a5a6">LLM 从 27</text>
  <text x="874" y="278" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#95a5a6">个工具中</text>
  <text x="874" y="291" text-anchor="middle" font-family="system-ui,sans-serif" font-size="6" fill="#95a5a6">自行选择</text>
