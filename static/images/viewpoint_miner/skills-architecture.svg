  </g>
  <text x="25" y="297" font-family="system-ui,sans-serif" font-size="9" fill="#95a5a6">调度</text>

  <g transform="translate(8, 438)">
    <rect x="0" y="0" width="14" height="14" rx="3" fill="#2c3e50"/>
    <text x="7" y="11" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" font-weight="700" fill="#f1c40f">3</text>
  </g>
  <text x="25" y="450" font-family="system-ui,sans-serif" font-size="9" fill="#95a5a6">执行</text>

  <!-- Right side: without Skill comparison block -->
