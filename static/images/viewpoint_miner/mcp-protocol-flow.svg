<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 520">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fafbfc;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#edf2f7;stop-opacity:1"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.12"/>
    </filter>
    <marker id="arrowRight" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0,0 10,3.5 0,7" fill="#5b6f82"/>
    </marker>
    <marker id="arrowLeft" markerWidth="10" markerHeight="7" refX="0" refY="3.5" orient="auto">
      <polygon points="10,0 0,3.5 10,7" fill="#5b6f82"/>
    </marker>
    <marker id="arrowDown" markerWidth="7" markerHeight="10" refX="3.5" refY="10" orient="auto">
      <polygon points="0,0 3.5,10 7,0" fill="#5b6f82"/>
    </marker>
  </defs>

  <rect width="900" height="520" rx="10" fill="url(#bgGrad)"/>

  <text x="450" y="32" text-anchor="middle" font-family="system-ui,sans-serif" font-size="20" font-weight="700" fill="#2c3e50">MCP 协议：从配置到调用的完整链路</text>

  <!-- ===== 配置阶段 ===== -->
  <text x="30" y="70" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#7f8c8d">① 配置阶段</text>

  <!-- mcp.json -->
  <rect x="30" y="80" width="200" height="52" rx="6" fill="#2c3e50" filter="url(#shadow)"/>
  <text x="130" y="101" text-anchor="middle" font-family="SF Mono,monospace" font-size="12" font-weight="700" fill="#f1c40f">~/.workbuddy/mcp.json</text>
  <text x="130" y="120" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="#95a5a6">{"command":"node", "args":[...]}</text>

  <!-- Arrow -->
  <line x1="230" y1="106" x2="280" y2="106" stroke="#5b6f82" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- WorkBuddy reads config -->
  <rect x="285" y="80" width="190" height="52" rx="6" fill="#2980b9" filter="url(#shadow)"/>
  <text x="380" y="101" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">WorkBuddy 启动</text>
  <text x="380" y="120" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" fill="rgba(255,255,255,0.8)">读取 mcpServers 配置</text>

  <line x1="475" y1="106" x2="530" y2="106" stroke="#5b6f82" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- spawn process -->
  <rect x="535" y="80" width="200" height="52" rx="6" fill="#8e44ad" filter="url(#shadow)"/>
  <text x="635" y="101" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#fff">子进程拉起</text>
  <text x="635" y="120" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="rgba(255,255,255,0.8)">spawn node mcp-server.js</text>

  <!-- ===== 发现阶段 ===== -->
  <text x="30" y="172" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#7f8c8d">② 发现阶段</text>

  <!-- Arrow down from config phase -->
  <path d="M635,132 L635,188" stroke="#5b6f82" stroke-width="1.5" stroke-dasharray="6,3" marker-end="url(#arrowDown)"/>

  <!-- initialize -->
  <rect x="535" y="192" width="200" height="34" rx="6" fill="#e8f0fe" stroke="#8e44ad" stroke-width="1"/>
  <text x="635" y="214" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#5b2d8e">initialize → capabilities</text>

  <line x1="535" y1="209" x2="450" y2="209" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arrowLeft)"/>

  <!-- tools/list -->
  <rect x="250" y="192" width="200" height="34" rx="6" fill="#e8f0fe" stroke="#8e44ad" stroke-width="1"/>
  <text x="350" y="214" text-anchor="middle" font-family="SF Mono,monospace" font-size="11" fill="#5b2d8e">tools/list → 27 tools</text>

  <line x1="250" y1="209" x2="160" y2="209" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arrowLeft)"/>

  <!-- Tool registry -->
  <rect x="30" y="185" width="125" height="48" rx="6" fill="#2ecc71" filter="url(#shadow)"/>
  <text x="92" y="206" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff">工具注册表</text>
  <text x="92" y="223" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">名字 + 描述 + Schema</text>

  <!-- ===== 调用阶段 ===== -->
  <text x="30" y="280" font-family="system-ui,sans-serif" font-size="12" font-weight="700" fill="#7f8c8d">③ 调用阶段</text>

  <!-- User says something -->
  <rect x="30" y="295" width="200" height="42" rx="6" fill="#ecf0f1" stroke="#bdc3c7" stroke-width="1"/>
  <text x="130" y="313" text-anchor="middle" font-family="system-ui,sans-serif" font-size="12" fill="#2c3e50">用户："分析一下北方稀土"</text>
  <text x="130" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#95a5a6">自然语言 → 意图识别</text>

  <line x1="230" y1="316" x2="285" y2="316" stroke="#5b6f82" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- LLM decides -->
  <rect x="290" y="295" width="185" height="42" rx="6" fill="#f39c12" filter="url(#shadow)"/>
  <text x="382" y="313" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff">LLM 工具决策</text>
  <text x="382" y="329" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="rgba(255,255,255,0.8)">匹配 Stock Analyst Skill</text>

  <line x1="475" y1="316" x2="535" y2="316" stroke="#5b6f82" stroke-width="2" marker-end="url(#arrowRight)"/>

  <!-- JSON-RPC call -->
  <rect x="540" y="290" width="200" height="52" rx="6" fill="#e74c3c" filter="url(#shadow)"/>
  <text x="640" y="310" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" font-weight="700" fill="#fff">{ "method": "tools/call"</text>
  <text x="640" y="326" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="rgba(255,255,255,0.9)">  "name": "summarize_..."</text>
  <text x="640" y="340" text-anchor="middle" font-family="SF Mono,monospace" font-size="10" fill="rgba(255,255,255,0.9)">  "args": {"stock_id": 10} }</text>

  <!-- MCP Process -->
  <line x1="640" y1="342" x2="640" y2="372" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <rect x="540" y="376" width="200" height="34" rx="6" fill="#8e44ad" filter="url(#shadow)"/>
  <text x="640" y="397" text-anchor="middle" font-family="system-ui,sans-serif" font-size="11" font-weight="700" fill="#fff">MCP Server 执行</text>

  <line x1="540" y1="393" x2="440" y2="393" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arrowLeft)"/>

  <!-- DB query -->
  <rect x="290" y="376" width="145" height="34" rx="6" fill="#27ae60" filter="url(#shadow)"/>
  <text x="362" y="396" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff">SQLite 查询 + 统计</text>

  <!-- Result flow back -->
  <line x1="290" y1="393" x2="230" y2="393" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arrowLeft)"/>

  <!-- Response -->
  <rect x="30" y="370" width="195" height="48" rx="6" fill="#2980b9" filter="url(#shadow)"/>
  <text x="127" y="390" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" fill="#fff">{ "dominant_direction": "偏空"</text>
  <text x="127" y="405" text-anchor="middle" font-family="SF Mono,monospace" font-size="9" fill="rgba(255,255,255,0.8)">  "recent_signals": [...] }</text>

  <!-- Arrow back up -->
  <path d="M127,370 L127,350" stroke="#5b6f82" stroke-width="1.5" marker-end="url(#arrowDown)"/>

  <!-- LLM synthesizes -->
  <rect x="290" y="435" width="185" height="38" rx="6" fill="#3498db" filter="url(#shadow)"/>
  <text x="382" y="453" text-anchor="middle" font-family="system-ui,sans-serif" font-size="10" font-weight="700" fill="#fff">LLM 合成自然语言回答</text>
  <text x="382" y="468" text-anchor="middle" font-family="system-ui,sans-serif" font-size="8" fill="rgba(255,255,255,0.8)">"北方稀土偏空，卖出类 7 条..."</text>

  <!-- Dashed box for Skill layer -->
  <rect x="275" y="280" width="220" height="100" rx="8" fill="none" stroke="#f39c12" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="385" y="276" text-anchor="middle" font-family="system-ui,sans-serif" font-size="9" fill="#f39c12">Skill 层（工具链路预设）</text>

  <!-- Bottom legend -->
  <g transform="translate(30, 490)">
    <text x="0" y="14" font-family="system-ui,sans-serif" font-size="10" fill="#95a5a6">通信协议：</text>
    <rect x="72" y="0" width="14" height="14" rx="3" fill="#8e44ad"/>
    <text x="90" y="12" font-family="SF Mono,monospace" font-size="9" fill="#5b6f82">JSON-RPC over stdin/stdout</text>

    <text x="280" y="14" font-family="system-ui,sans-serif" font-size="10" fill="#95a5a6">语言：</text>
    <rect x="320" y="0" width="14" height="14" rx="3" fill="#2c3e50"/>
    <text x="338" y="12" font-family="system-ui,sans-serif" font-size="9" fill="#5b6f82">Node.js + Zod Schema</text>

    <text x="470" y="14" font-family="system-ui,sans-serif" font-size="10" fill="#95a5a6">进程模型：</text>
    <rect x="525" y="0" width="14" height="14" rx="3" fill="#e74c3c"/>
    <text x="543" y="12" font-family="system-ui,sans-serif" font-size="9" fill="#5b6f82">长生命周期子进程</text>
  </g>
</svg>
